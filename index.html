<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALORANT TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f1923; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: #1f2937; border-top: 4px solid #ff4655; padding: 2rem; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 400px; }
        input, select { background: #000; border: 1px solid #333; color: white; width: 100%; padding: 10px; margin-bottom: 1rem; outline: none; }
        button { background: #ff4655; width: 100%; padding: 12px; font-bold; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #ff5e6a; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 4px; text-align: center; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="text-2xl font-bold mb-6 text-center text-[#ff4655]">AGENT STATS</h1>
        <input id="pName" type="text" placeholder="İsim (Örn: cned)">
        <input id="pTag" type="text" placeholder="Tag (Örn: tr1)">
        <select id="pReg">
            <option value="eu">Europe (TR)</option>
            <option value="na">North America</option>
            <option value="ap">Asia</option>
        </select>
        <button onclick="checkStats()">SORGULA</button>

        <div id="loading" class="hidden text-center mt-4">Veriler çekiliyor...</div>

        <div id="res" class="hidden">
            <div class="stat-box">
                <img id="rankImg" src="" class="w-24 h-24 mx-auto">
                <div id="rankName" class="text-xl font-bold mt-2">---</div>
                <div id="rankRR" class="text-red-500 font-mono">0 RR</div>
            </div>
        </div>
    </div>

    <script>
        async function checkStats() {
            const name = document.getElementById('pName').value.trim();
            const tag = document.getElementById('pTag').value.trim();
            const reg = document.getElementById('pReg').value;
            const res = document.getElementById('res');
            const loader = document.getElementById('loading');

            if(!name || !tag) return alert("Boş alan bırakmayın!");

            res.classList.add('hidden');
            loader.classList.remove('hidden');

            try {
                // API v1 MMR çağrısı
                const response = await fetch(`https://api.henrikdev.xyz/valorant/v1/mmr/${reg}/${name}/${tag}`);
                const data = await response.json();

                if(data.status === 200) {
                    document.getElementById('rankName').innerText = data.data.currenttierpatched;
                    document.getElementById('rankRR').innerText = data.data.ranking_in_tier + " RR";
                    document.getElementById('rankImg').src = `https://media.valorant-api.com/competitivetiers/03621f13-43b3-039d-b718-f2a7304c2c12/${data.data.currenttier}/largeicon.png`;
                    res.classList.remove('hidden');
                } else {
                    alert("Oyuncu bulunamadı! Lütfen bilgilerini ve bölgeni kontrol et.");
                }
            } catch (e) {
                alert("API şu an yanıt vermiyor, lütfen 1 dakika sonra tekrar dene.");
            } finally {
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
