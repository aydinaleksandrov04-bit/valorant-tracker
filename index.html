<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALORANT // JETT TRACKER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --v-red: #ff4655; --v-dark-bg: #1a202c; --v-light-bg: #2d3748; }
        body { 
            font-family: 'Roboto Mono', monospace; 
            background-color: var(--v-dark-bg); 
            color: white;
            background-image: linear-gradient(rgba(26, 32, 44, 0.8), rgba(26, 32, 44, 0.8)), url('https://images.contentstack.io/v3/assets/bltb6530b271fddd0b1/blt7209ffce3d07e601/5eb0be061a44e21a2091d09e/Jett_KeyArt_587x900.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container-card {
            background: rgba(45, 55, 72, 0.9); /* Slightly transparent background for the card */
            border: 1px solid var(--v-red);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 70, 85, 0.3);
            max-width: 800px;
            width: 100%;
        }
        .v-input {
            background-color: var(--v-dark-bg);
            border: 1px solid var(--v-red);
            color: white;
            padding: 12px;
            border-radius: 5px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .v-input:focus {
            border-color: #ff8c99;
            box-shadow: 0 0 8px rgba(255, 70, 85, 0.5);
        }
        .v-button {
            background-color: var(--v-red);
            color: white;
            padding: 12px 20px;
            border-radius: 5px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
        }
        .v-button:hover {
            background-color: #ff5e6a;
            transform: translateY(-2px);
        }
        .stat-label { font-weight: bold; color: #a0aec0; }
        .stat-value { font-family: 'Oswald', sans-serif; font-size: 1.8rem; color: var(--v-red); text-shadow: 0 0 5px rgba(255, 70, 85, 0.6); }
        .rank-tier-text { font-family: 'Oswald', sans-serif; font-size: 1.2rem; text-transform: uppercase; }
        .player-name-text { font-family: 'Oswald', sans-serif; font-size: 2.2rem; text-transform: uppercase; text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }
        .kda-value { font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="container-card p-8">
        <h1 class="text-center text-4xl font-bold uppercase mb-8 text-white">
            <span class="text-red-500">JETT</span> TERMINAL
        </h1>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <input id="riotName" type="text" placeholder="Riot ID (Örn: cned)" class="v-input col-span-2">
            <input id="riotTag" type="text" placeholder="Tag (Örn: TR1)" class="v-input">
            <select id="regionSelect" class="v-input">
                <option value="eu">Europe (TR/EU)</option>
                <option value="na">North America</option>
                <option value="ap">Asia Pacific</option>
                <option value="kr">Korea</option>
                <option value="latam">Latin America</option>
                <option value="br">Brazil</option>
            </select>
        </div>
        <button onclick="searchPlayer()" class="v-button w-full mb-8" id="searchBtn">VERİLERİ SORGULA</button>

        <div id="loadingIndicator" class="hidden text-center text-xl text-yellow-400">
            <div class="w-12 h-12 border-4 border-yellow-400 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            JETT HAREKETE GEÇİYOR...
        </div>

        <div id="playerResults" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="bg-gradient-to-br from-gray-800 to-gray-900 p-6 rounded-lg text-center shadow-lg border-b-4 border-red-500 md:col-span-1">
                    <img id="rankIcon" src="" alt="Rank Icon" class="w-32 h-32 mx-auto mb-4 object-contain">
                    <p class="player-name-text" id="playerNameDisplay">---</p>
                    <p class="rank-tier-text text-gray-400" id="playerRankDisplay">---</p>
                </div>

                <div class="bg-gradient-to-br from-gray-800 to-gray-900 p-6 rounded-lg shadow-lg border-b-4 border-blue-500 flex flex-col justify-around">
                    <div>
                        <p class="stat-label">GÜNCEL RR:</p>
                        <p class="stat-value" id="currentRR">---</p>
                    </div>
                    <div class="mt-4">
                        <p class="stat-label">K/D/A:</p>
                        <p class="kda-value text-white" id="kdaDisplay">---</p>
                    </div>
                </div>

                <div class="bg-gradient-to-br from-gray-800 to-gray-900 p-6 rounded-lg shadow-lg border-b-4 border-green-500 flex flex-col justify-around">
                    <div>
                        <p class="stat-label">KAZANMA ORANI:</p>
                        <p class="stat-value" id="winRateDisplay">---</p>
                    </div>
                    <div class="mt-4">
                        <p class="stat-label">BÖLGE:</p>
                        <p class="stat-value uppercase" id="regionDisplay">---</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="errorMessage" class="hidden bg-red-800 text-white p-4 rounded-md mt-8 text-center">
            Oyuncu bulunamadı! Lütfen ID, Tag ve Bölgenizi kontrol edin. Profiliniz gizli olabilir (tracker.gg'den açmanız gerekebilir).
        </div>
    </div>

    <script>
        // HENRIKDEV API KEY BURAYA GELECEK!
        // https://docs.henrikdev.xyz/valorant.html adresinden ücretsiz bir key almalısın.
        // const API_KEY = "HEDEF-ALDIĞIN-ANAHTAR"; // Örnek: "HDEV-ABCDEFG..."
        
        async function searchPlayer() {
            const name = document.getElementById('riotName').value.trim();
            const tag = document.getElementById('riotTag').value.trim();
            const region = document.getElementById('regionSelect').value;
            
            const loadingIndicator = document.getElementById('loadingIndicator');
            const playerResults = document.getElementById('playerResults');
            const errorMessage = document.getElementById('errorMessage');
            const searchBtn = document.getElementById('searchBtn');

            // API_KEY kontrolü
            // if (!API_KEY || API_KEY === "HEDEF-ALDIĞIN-ANAHTAR") {
            //     alert("Lütfen API Key'inizi JavaScript koduna ekleyin! HenrikDev dokümanlarına bakın.");
            //     return;
            // }

            if (!name || !tag) {
                alert("Riot ID ve Tag boş bırakılamaz!");
                return;
            }

            playerResults.classList.add('hidden');
            errorMessage.classList.add('hidden');
            loadingIndicator.classList.remove('hidden');
            searchBtn.disabled = true;
            searchBtn.innerText = "SORGULANIYOR...";

            try {
                // Riot API'sine doğrudan erişim için farklı bir endpoint kullanıyoruz (daha stabil)
                const url = `https://api.henrikdev.xyz/valorant/v1/mmr-history/${region}/${encodeURIComponent(name)}/${encodeURIComponent(tag)}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.status === 200 && data.data && data.data.length > 0) {
                    const latestMatch = data.data[0]; // Son maçın verileri

                    document.getElementById('playerNameDisplay').innerText = `${name}#${tag}`;
                    document.getElementById('playerRankDisplay').innerText = latestMatch.currenttierpatched || 'Unranked';
                    document.getElementById('currentRR').innerText = `${latestMatch.ranking_in_tier} RR`;
                    document.getElementById('regionDisplay').innerText = region.toUpperCase();

                    // Rank görseli
                    document.getElementById('rankIcon').src = `https://media.valorant-api.com/competitivetiers/03621f13-43b3-039d-b718-f2a7304c2c12/${latestMatch.currenttier}/largeicon.png`;

                    // Ek detaylar için başka bir API çağrısı yapabiliriz (KDA, Win Rate için)
                    // Ancak bu örnekte basit tutmak için sadece MMR verilerini kullanıyoruz.
                    // KDA ve Win Rate için farklı bir API endpoint'i veya veriyi ayrıştırma gerekir.
                    // Şimdilik varsayılan değerler verelim:
                    document.getElementById('kdaDisplay').innerText = `Hesaplanıyor...`; 
                    document.getElementById('winRateDisplay').innerText = `Hesaplanıyor...`; 
                    // Bu kısımları daha sonra ekleyebiliriz

                    playerResults.classList.remove('hidden');
                } else {
                    errorMessage.innerText = data.errors?.[0]?.message || "Oyuncu bulunamadı! ID, Tag veya bölge yanlış. Profilinizin gizli olup olmadığını kontrol edin (tracker.gg).";
                    errorMessage.classList.remove('hidden');
                }
            } catch (error) {
                console.error("API Fetch Error:", error);
                errorMessage.innerText = "Sunucuya ulaşılamıyor veya bir hata oluştu. Lütfen tekrar deneyin.";
                errorMessage.classList.remove('hidden');
            } finally {
                loadingIndicator.classList.add('hidden');
                searchBtn.disabled = false;
                searchBtn.innerText = "VERİLERİ SORGULA";
            }
        }
    </script>
</body>
</html>
