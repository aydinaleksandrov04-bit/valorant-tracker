<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALORANT // AGENT TRACKER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --v-red: #ff4655; --v-dark: #0f1923; --v-blue: #111c22; }
        body { 
            background-color: var(--v-dark); 
            color: white; 
            font-family: 'Oswald', sans-serif;
            background-image: url('https://images.contentstack.io/v3/assets/bltb6530b271fddd0b1/blt72070e3046f890c2/647908f029013c549646487e/MatchHistory_Loading_Screen.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-blend-mode: overlay;
        }
        .glass { background: rgba(15, 25, 35, 0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255, 70, 85, 0.2); }
        .v-red-btn { background: var(--v-red); transition: 0.3s; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); }
        .v-red-btn:hover { background: white; color: var(--v-red); transform: scale(1.05); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 border-b-2 border-red-500 pb-6">
            <h1 class="text-5xl font-bold italic tracking-tighter">AGENT <span class="text-[#ff4655]">TRACKER</span></h1>
            <div class="mt-4 md:mt-0 font-mono text-sm text-red-500 bg-black px-4 py-2 border border-red-500">
                SYSTEM STATUS: <span id="api-status">CONNECTING...</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="md:col-span-2 flex gap-2">
                <input id="targetName" type="text" placeholder="Riot ID" class="w-full bg-black border border-gray-700 p-3 outline-none focus:border-red-500 font-mono">
                <input id="targetTag" type="text" placeholder="TAG" class="w-24 bg-black border border-gray-700 p-3 outline-none focus:border-red-500 font-mono">
                <button onclick="updateStats()" class="v-red-btn px-8 font-bold text-black">SORGULA</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="glass p-8 rounded-sm text-center">
                <div class="relative inline-block mb-4">
                    <img id="rankIcon" src="https://media.valorant-api.com/competitivetiers/03621f13-43b3-039d-b718-f2a7304c2c12/0/largeicon.png" class="w-32 h-32 mx-auto">
                    <div id="rankLabel" class="absolute bottom-0 bg-red-600 px-2 py-1 text-xs font-bold w-full">YÜKLENİYOR</div>
                </div>
                <h2 id="playerName" class="text-3xl font-bold mt-4 italic">PLAYER <span class="text-gray-500 text-xl">#000</span></h2>
            </div>

            <div class="md:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="glass p-6 flex flex-col justify-center border-l-4 border-green-500">
                    <span class="text-gray-400 font-mono text-xs uppercase">Güncel Derece</span>
                    <span id="rankName" class="text-4xl font-bold">---</span>
                </div>
                <div class="glass p-6 flex flex-col justify-center border-l-4 border-yellow-500">
                    <span class="text-gray-400 font-mono text-xs uppercase">Kazanılan RR</span>
                    <span id="rankRR" class="text-4xl font-bold">---</span>
                </div>
                <div class="glass p-6 flex flex-col justify-center border-l-4 border-blue-500">
                    <span class="text-gray-400 font-mono text-xs uppercase">Son Maç Değişimi</span>
                    <span id="lastChange" class="text-4xl font-bold">---</span>
                </div>
                <div class="glass p-6 flex flex-col justify-center border-l-4 border-red-500">
                    <span class="text-gray-400 font-mono text-xs uppercase">Sunucu</span>
                    <span id="region" class="text-4xl font-bold uppercase">EU</span>
                </div>
            </div>
        </div>

        <footer class="mt-20 text-center font-mono text-xs text-gray-500">
            DATA PROVIDED BY HENRIKDEV API // NOT AFFILIATED WITH RIOT GAMES
        </footer>
    </div>

    <script>
        // BURAYI KENDİ BİLGİLERİNE GÖRE DÜZENLE (Varsayılan olarak seni açar)
        const defaultName = "Swoon"; 
        const defaultTag = "EUW";

        async function fetchStats(name, tag) {
            const statusLabel = document.getElementById('api-status');
            statusLabel.innerText = "FETCHING...";
            statusLabel.className = "mt-4 md:mt-0 font-mono text-sm text-yellow-500 bg-black px-4 py-2 border border-yellow-500";

            try {
                // MMR Verisi Çekme
                const response = await fetch(`https://api.henrikdev.xyz/valorant/v1/mmr/eu/${name}/${tag}`);
                const result = await response.json();

                if(result.status === 200) {
                    const data = result.data;
                    
                    // Arayüzü Güncelle
                    document.getElementById('playerName').innerHTML = `${data.name} <span class="text-gray-500 text-xl">#${data.tag}</span>`;
                    document.getElementById('rankName').innerText = data.currenttierpatched || "Unranked";
                    document.getElementById('rankRR').innerText = (data.ranking_in_tier || "0") + " RR";
                    document.getElementById('rankLabel').innerText = data.currenttierpatched ? "ACTIVE" : "NO RANK";
                    document.getElementById('lastChange').innerText = (data.mmr_change_to_last_game >= 0 ? "+" : "") + data.mmr_change_to_last_game;
                    
                    // Renk Değişimi
                    document.getElementById('lastChange').className = data.mmr_change_to_last_game >= 0 ? "text-4xl font-bold text-green-500" : "text-4xl font-bold text-red-500";

                    statusLabel.innerText = "ONLINE";
                    statusLabel.className = "mt-4 md:mt-0 font-mono text-sm text-green-500 bg-black px-4 py-2 border border-green-500";
                } else {
                    statusLabel.innerText = "USER NOT FOUND";
                    statusLabel.className = "mt-4 md:mt-0 font-mono text-sm text-red-500 bg-black px-4 py-2 border border-red-500";
                }
            } catch (error) {
                statusLabel.innerText = "API ERROR";
                console.error(error);
            }
        }

        // Manuel Sorgulama Fonksiyonu
        function updateStats() {
            const n = document.getElementById('targetName').value;
            const t = document.getElementById('targetTag').value;
            if(n && t) fetchStats(n, t);
        }

        // Sayfa ilk açıldığında varsayılanı yükle
        window.onload = () => fetchStats(defaultName, defaultTag);
    </script>
</body>
</html>
